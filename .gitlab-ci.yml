# CI for ContextForge (Next.js + TypeScript).
# Runs the quality gates on every merge request and on the default branch.

default:
  image: node:20-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
    policy: pull-push
  before_script:
    - npm ci --cache .npm --prefer-offline

stages:
  - verify

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test:
  stage: verify
  script:
    - npm test

lint:
  stage: verify
  script:
    - npm run lint
  # Do not block merges on lint until the imported project's lint config is
  # confirmed clean in CI.
  allow_failure: true

build:
  stage: verify
  script:
    - npm run build
  # next build can require runtime env vars; keep it visible but non-blocking
  # until CI variables are configured.
  allow_failure: true
