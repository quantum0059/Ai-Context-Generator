# CI for ContextForge (Next.js + TypeScript).
# Runs the three quality gates on every merge request and on the default branch.

default:
  image: node:20-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull

stages:
  - install
  - verify

variables:
  # Keep npm's cache inside the project so it can be cached between jobs.
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

install:
  stage: install
  script:
    - npm ci
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint:
  stage: verify
  needs: [install]
  script:
    - npm run lint

test:
  stage: verify
  needs: [install]
  script:
    - npm test

build:
  stage: verify
  needs: [install]
  script:
    - npm run build
